name: Check for Outdated NPM Dependencies
on: [push]
jobs:
  check-outdated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read versions from package.json
        id: pkg-versions
        run: |
          echo "NODE_VERSION=$(jq -r '.engines.node' package.json | grep -oP '\d+\.\d+\.\d+' | head -1)" >> $GITHUB_OUTPUT
          echo "NPM_VERSION=$(jq -r '.engines.npm' package.json | grep -oP '\d+\.\d+\.\d+' | head -1)" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.pkg-versions.outputs.NODE_VERSION }}

      - name: Install npm
        run: npm install -g npm@${{ steps.pkg-versions.outputs.NPM_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: List outdated dependencies
        run: npm outdated || true

